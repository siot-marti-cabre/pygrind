id: "t4-001"
title: "Longest Common Subsequence"
tier: 4
topic: "dp"
description: "Given two strings, find the length of their longest common subsequence (LCS). A subsequence is a sequence that can be derived from another sequence by deleting some or no elements without changing the order of the remaining elements. Read two strings, one per line, and print the length of their LCS."
time_estimate: 12
hint: "Use a 2D DP table where dp[i][j] represents the LCS length of the first i characters of string A and the first j characters of string B. If characters match, dp[i][j] = dp[i-1][j-1] + 1; otherwise take the max of dp[i-1][j] and dp[i][j-1]."
solution: |
  a = input()
  b = input()
  n, m = len(a), len(b)
  dp = [[0] * (m + 1) for _ in range(n + 1)]
  for i in range(1, n + 1):
      for j in range(1, m + 1):
          if a[i - 1] == b[j - 1]:
              dp[i][j] = dp[i - 1][j - 1] + 1
          else:
              dp[i][j] = max(dp[i - 1][j], dp[i][j - 1])
  print(dp[n][m])
source: "original"
validation: "exact"
