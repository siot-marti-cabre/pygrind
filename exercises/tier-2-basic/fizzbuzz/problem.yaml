id: "t2-004"
title: "FizzBuzz"
tier: 2
topic: "loops"
description: "Read an integer N from stdin. For each number from 1 to N (inclusive), print \"FizzBuzz\" if the number is divisible by both 3 and 5, \"Fizz\" if divisible by 3 only, \"Buzz\" if divisible by 5 only, or the number itself otherwise. Print one result per line."
time_estimate: 5
hint: "Check divisibility by 15 first (both 3 and 5), then by 3, then by 5. Use the modulo operator (%)."
solution: |
  n = int(input())
  for i in range(1, n + 1):
      if i % 15 == 0:
          print("FizzBuzz")
      elif i % 3 == 0:
          print("Fizz")
      elif i % 5 == 0:
          print("Buzz")
      else:
          print(i)
source: "original"
validation: "exact"
