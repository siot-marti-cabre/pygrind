id: "tier5-shortest-path"
title: "Shortest Path in Grid"
tier: 5
topic: "graphs"
description: "Given an NxN grid of 0s and 1s, find the shortest path from top-left (0,0) to bottom-right (N-1,N-1) moving only through 0s (up/down/left/right). Print the path length (number of steps). If no path exists, print -1. First line: N. Next N lines: space-separated grid values."
time_estimate: 20
hint: "Use BFS (breadth-first search) from (0,0). Track visited cells."
solution: |
  from collections import deque
  n = int(input())
  grid = []
  for _ in range(n):
      grid.append(list(map(int, input().split())))
  if grid[0][0] == 1 or grid[n-1][n-1] == 1:
      print(-1)
  else:
      q = deque([(0, 0, 0)])
      visited = {(0, 0)}
      found = False
      while q:
          r, c, d = q.popleft()
          if r == n-1 and c == n-1:
              print(d)
              found = True
              break
          for dr, dc in [(-1,0),(1,0),(0,-1),(0,1)]:
              nr, nc = r+dr, c+dc
              if 0 <= nr < n and 0 <= nc < n and grid[nr][nc] == 0 and (nr,nc) not in visited:
                  visited.add((nr,nc))
                  q.append((nr,nc,d+1))
      if not found:
          print(-1)
source: "original"
validation: "exact"
